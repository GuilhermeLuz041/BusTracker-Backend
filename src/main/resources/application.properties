spring.application.name=backend

spring.datasource.url=jdbc:postgresql://localhost:5432/bustracker_db
spring.datasource.username=bustracker_user
spring.datasource.password=bustracker_password
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

mqtt.broker.url=tcp://localhost:1883
mqtt.client.id=bustracker-backend-client
mqtt.topic.posicao=v1/rastreamento/onibus